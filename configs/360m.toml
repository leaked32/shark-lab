[model]
# `vocab` should be roughly the same as the tokenizer used by trainer.py, if you are unsure about it, please leave it `0` and the trainer.py will use the same from tokenizer. Focus on configuring the tokenizer instead.
vocab = 0
layer = 32
chan = 960
q_head = 15
kv_head = 5
mlp_mul = 2560
bias = false # not recommended unless you want to load a compatible model, you have to modify `model.py`. *Actually it's ignored so far*
drop = 0.0 # float. for pretraining 0 is good, for finetuning try 0.1+
eps = 1e-5
rope_theta = 100000

[general]
system_prompt = """
...
"""
tokenizer_path = "/home/..."
working_directory = "/home/..."

[train]
# The path directly stores the current model, be aware!

max_steps = 10000
log_interval = 1
save_interval = 20

dataset_type = 1
batch_count = 1
# 0 - CORPUS; 1 - SFT
dataset_sft_train = "/home/..."
dataset_train = "/home/..."
dataset_validation = "/home/..."
corpus_block_size = 512

# optimizer_learning_rate = 6e-4
optimizer_learning_rate = 2e-5

adamw_weight_decay = 1e-1
adamw_beta1 = 0.9
adamw_beta2 = 0.95

[system]
device = "cpu"
dtype = "bfloat16" # Caution: `float16` may cause problems for optimizer.
